<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Crowd Runner 3D</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }

      /* Container holds both Three.js canvas (behind) and PixiJS canvas (front) */
      #game-container {
        position: relative;
        display: inline-block;
        line-height: 0;
      }

      /* Three.js canvas: behind, absolutely positioned to fill container */
      #three-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        z-index: 0;
        display: block;
        touch-action: none;
      }

      /* PixiJS canvas: on top, transparent background, passes touch through game area */
      #pixi-canvas {
        position: relative;
        z-index: 1;
        display: block;
        background: transparent !important;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
